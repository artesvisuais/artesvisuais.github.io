        let zoomLevel = 1;
        
        function showPage(index) {
            if (index >= 0 && index < totalPages) {
                currentPage = index;
                const img = document.getElementById('comic-image');
                img.src = 'img_cbr/' + images[currentPage];
                img.alt = 'Página ' + (currentPage + 1);
                
                document.getElementById('page-num').textContent = currentPage + 1;
                
                // Aplicar zoom
                img.style.transform = `scale(${zoomLevel})`;
                img.style.transformOrigin = 'top center';
                
                // Atualizar botões
                document.getElementById('prev-btn').disabled = (currentPage === 0);
                document.getElementById('next-btn').disabled = (currentPage === totalPages - 1);
                
                // Rolar para o topo
                window.scrollTo(0, 0);
            }
        }
        
        function nextPage() {
            if (currentPage < totalPages - 1) {
                showPage(currentPage + 1);
            }
        }
        
        function prevPage() {
            if (currentPage > 0) {
                showPage(currentPage - 1);
            }
        }
        
        function zoomIn() {
            if (zoomLevel < 3) {
                zoomLevel += 0.25;
                document.getElementById('comic-image').style.transform = `scale(${zoomLevel})`;
                document.getElementById('comic-image').style.transformOrigin = 'top center';
                document.getElementById('zoom-level').textContent = Math.round(zoomLevel * 100) + '%';
            }
        }
        
        function zoomOut() {
            if (zoomLevel > 0.5) {
                zoomLevel -= 0.25;
                document.getElementById('comic-image').style.transform = `scale(${zoomLevel})`;
                document.getElementById('comic-image').style.transformOrigin = 'top center';
                document.getElementById('zoom-level').textContent = Math.round(zoomLevel * 100) + '%';
            }
        }
        
        function resetZoom() {
            zoomLevel = 1;
            document.getElementById('comic-image').style.transform = 'scale(1)';
            document.getElementById('zoom-level').textContent = '100%';
        }
        
        // Controles de teclado
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextPage();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevPage();
            }
        });
        
        // Suporte a gestos touch (swipe)
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);
        
        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                nextPage();
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                prevPage();
            }
        }
        
        // Carregar primeira página ao iniciar
        window.onload = function() {
            showPage(0);
        };
