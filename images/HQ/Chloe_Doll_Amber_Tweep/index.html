        const totalPages = images.length;
        let currentPage = 0;
        let globalZoom = 1;
        let modalZoom = 1;
        let modalCurrentPage = 0;

        function buildImages() {
            const container = document.getElementById('reader-container');
            container.innerHTML = '';
            images.forEach((img, index) => {
                const imgEl = document.createElement('img');
                imgEl.id = 'page-' + index;
                imgEl.className = 'comic-page';
                imgEl.src = 'img_cbr/' + img;
                imgEl.alt = 'Página ' + (index + 1);
                imgEl.loading = 'lazy';
                imgEl.addEventListener('click', () => openModal(index));
                container.appendChild(imgEl);
            });
        }

        function scrollToPage(index) {
            if (index >= 0 && index < totalPages) {
                currentPage = index;
                const page = document.getElementById('page-' + index);
                if (page) {
                    page.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    updateProgress();
                    updateButtons();
                }
            }
        }

        function nextPage() { if (currentPage < totalPages - 1) scrollToPage(currentPage + 1); }
        function prevPage() { if (currentPage > 0) scrollToPage(currentPage - 1); }

        function goToPage() {
            const input = document.getElementById('jump-input');
            let pageNum = parseInt(input.value) - 1;
            if (isNaN(pageNum) || pageNum < 0) pageNum = 0;
            if (pageNum >= totalPages) pageNum = totalPages - 1;
            scrollToPage(pageNum);
            input.value = '';
        }

        function updateProgress() {
            document.getElementById('progress-bar').style.width = ((currentPage + 1) / totalPages * 100) + '%';
            document.getElementById('page-indicator').textContent = 'Página ' + (currentPage + 1) + ' de ' + totalPages;
        }

        function updateButtons() {
            document.getElementById('prev-btn').style.opacity = currentPage === 0 ? '0.5' : '1';
            document.getElementById('next-btn').style.opacity = currentPage === totalPages - 1 ? '0.5' : '1';
        }

        function applyGlobalZoom() {
            const container = document.getElementById('reader-container');
            container.style.transform = `scale(${globalZoom})`;
            container.style.width = globalZoom > 1 ? (100 / globalZoom) + '%' : '100%';
        }

        function zoomIn() {
            if (globalZoom < 5) {
                globalZoom += 0.1;
                globalZoom = Math.round(globalZoom * 10) / 10;
                applyGlobalZoom();
            }
        }

        function zoomOut() {
            if (globalZoom > 0.2) {
                globalZoom -= 0.1;
                globalZoom = Math.round(globalZoom * 10) / 10;
                applyGlobalZoom();
            }
        }

        function resetZoom() { globalZoom = 1; applyGlobalZoom(); }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const pageId = entry.target.id;
                    const pageNum = parseInt(pageId.split('-')[1]);
                    if (!isNaN(pageNum)) {
                        currentPage = pageNum;
                        updateProgress();
                        updateButtons();
                    }
                }
            });
        }, { threshold: 0.6 });

        function openModal(index) {
            modalCurrentPage = index;
            modalZoom = 1;
            updateModalImage();
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function updateModalImage() {
            const modalImg = document.getElementById('modal-image');
            modalImg.src = 'img_cbr/' + images[modalCurrentPage];
            modalImg.style.transform = `scale(${modalZoom})`;
        }
        function modalNext() {
            if (modalCurrentPage < totalPages - 1) {
                modalCurrentPage++;
                modalZoom = 1;
                updateModalImage();
            }
        }
        function modalPrev() {
            if (modalCurrentPage > 0) {
                modalCurrentPage--;
                modalZoom = 1;
                updateModalImage();
            }
        }
        function modalZoomIn() { if (modalZoom < 3) { modalZoom += 0.5; updateModalImage(); } }
        function modalZoomOut() { if (modalZoom > 0.5) { modalZoom -= 0.5; updateModalImage(); } }
        function modalResetZoom() { modalZoom = 1; updateModalImage(); }

        document.addEventListener('keydown', e => {
            if (document.getElementById('modal').classList.contains('active')) {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowRight') { e.preventDefault(); modalNext(); }
                if (e.key === 'ArrowLeft') { e.preventDefault(); modalPrev(); }
                if (e.key === '+' || e.key === '=') { e.preventDefault(); modalZoomIn(); }
                if (e.key === '-') { e.preventDefault(); modalZoomOut(); }
                if (e.key === '0') { e.preventDefault(); modalResetZoom(); }
                return;
            }
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevPage(); }
            else if (e.key === 'Home') { e.preventDefault(); scrollToPage(0); }
            else if (e.key === 'End') { e.preventDefault(); scrollToPage(totalPages - 1); }
            else if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
            else if (e.key === '-') { e.preventDefault(); zoomOut(); }
            else if (e.key === '0') { e.preventDefault(); resetZoom(); }
        });

        let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].screenY; }, { passive: true });
        document.addEventListener('touchend', e => {
            if (document.getElementById('modal').classList.contains('active')) return;
            const diff = touchStartY - e.changedTouches[0].screenY;
            if (Math.abs(diff) > 180) diff > 0 ? nextPage() : prevPage();
        }, { passive: true });

        document.addEventListener('DOMContentLoaded', () => {
            buildImages();
            setTimeout(() => {
                document.querySelectorAll('.comic-page').forEach(page => {
                    observer.observe(page);
                });
            }, 500);
            updateProgress();
            updateButtons();
            document.getElementById('jump-input').addEventListener('change', goToPage);
        });
    </script>
</body>
</html>
