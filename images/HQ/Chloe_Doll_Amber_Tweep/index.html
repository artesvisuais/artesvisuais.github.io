mber-Tweep-89.jpg", "Chloe-Doll-Amber-Tweep-9.jpg", "Chloe-Doll-Amber-Tweep-90.jpg", "Chloe-Doll-Amber-Tweep-91.jpg", "Chloe-Doll-Amber-Tweep-92.jpg", "Chloe-Doll-Amber-Tweep-93.jpg", "Chloe-Doll-Amber-Tweep-94.jpg", "Chloe-Doll-Amber-Tweep-95.jpg", "Chloe-Doll-Amber-Tweep-96.jpg", "Chloe-Doll-Amber-Tweep-97.jpg", "Chloe-Doll-Amber-Tweep-98.jpg", "Chloe-Doll-Amber-Tweep-99.jpg"];
        const totalPages = images.length;
        let currentPage = 0;
        
        function scrollToPage(index) {
            if (index >= 0 && index < totalPages) {
                currentPage = index;
                const page = document.getElementById('page-' + index);
                if (page) {
                    page.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    updateProgress();
                    updateButtons();
                }
            }
        }
        
        function nextPage() { if (currentPage < totalPages - 1) scrollToPage(currentPage + 1); }
        function prevPage() { if (currentPage > 0) scrollToPage(currentPage - 1); }
        
        function updateProgress() {
            document.getElementById('progress-bar').style.width = ((currentPage + 1) / totalPages * 100) + '%';
            document.getElementById('page-indicator').textContent = 'Página ' + (currentPage + 1) + ' de ' + totalPages;
        }
        
        function updateButtons() {
            document.getElementById('prev-btn').style.opacity = currentPage === 0 ? '0.5' : '1';
            document.getElementById('next-btn').style.opacity = currentPage === totalPages - 1 ? '0.5' : '1';
        }
        
        // Observer para detectar página visível
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const pageId = entry.target.id;
                    const pageNum = parseInt(pageId.split('-')[1]);
                    if (!isNaN(pageNum)) {
                        currentPage = pageNum;
                        updateProgress();
                        updateButtons();
                    }
                }
            });
        }, { threshold: 0.6 });
        
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.comic-page').forEach(page => observer.observe(page));
            updateProgress();
            updateButtons();
        });
        
        // Teclado
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevPage(); }
            else if (e.key === 'Home') { e.preventDefault(); scrollToPage(0); }
            else if (e.key === 'End') { e.preventDefault(); scrollToPage(totalPages - 1); }
        });
        
        // Touch swipe
        let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].screenY; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = touchStartY - e.changedTouches[0].screenY;
            if (Math.abs(diff) > 50) diff > 0 ? nextPage() : prevPage();
        }, { passive: true });
    </script>
