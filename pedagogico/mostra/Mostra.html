<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votação de Desenhos – EMEF Décio Moreira</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .modal-overlay {
      background: #2c3e50;
      border-radius: 2rem;
      padding: 3rem;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #f1c40f;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: #ecf0f1;
    }
    .btn {
      display: inline-block;
      background: #3498db;
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
      cursor: pointer;
    }
    .btn:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div class="modal-overlay">
    <h1>🚀 Atenção</h1>
    <p>Estamos na reta final da nossa votação!<br>Ela encerra dia <strong>19/06, sexta-feira</strong>.<br><br>
    Para garantir ainda mais a integridade da votação, agora é necessário estar logado em qualquer conta Google.<br>
    <small>(Isso dificulta a automação de votos.)</small></p>
    <a href="https://script.google.com/macros/s/AKfycbyqS5ok16vWstxYJeRgUPp9ZMVZvJY9dXON4FWki_BHTtfftwRNWpBgOvWMpfcOrD1s/exec" class="btn">Click aqui para Votar!</a>
  </div>
</body>
</html>
