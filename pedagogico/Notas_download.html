<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download de Arquivos</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.5rem; }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:disabled { background-color: #ccc; }
        .loader { font-size: 14px; color: #666; margin-bottom: 10px; }

        /* Modal - ocupando o máximo de espaço */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            height: 100%;
            max-width: 98vw;
            max-height: 98vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #333;
            background: none;
            border: none;
            z-index: 10;
            background-color: rgba(255,255,255,0.7);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background-color: rgba(255,255,255,0.9);
        }
        .modal-iframe {
            width: 100%;
            flex: 1;
            min-height: 0;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
        }
        .modal-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            width: 100%;
            flex-shrink: 0;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            border-radius: 8px;
        }
        .btn-download-modal {
            background-color: #4285f4;
        }
        .btn-close-modal {
            background-color: #ea4335;
        }

        /* Ajustes para telas pequenas */
        @media (max-width: 600px) {
            .modal-content {
                padding: 10px;
                border-radius: 10px;
            }
            .modal-iframe {
                border-radius: 5px;
            }
            .modal-close {
                top: 5px;
                right: 10px;
                width: 32px;
                height: 32px;
                font-size: 22px;
            }
            .modal-actions button {
                font-size: 12px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Baixar Arquivos</h2>
    <div id="status" class="loader">Carregando lista...</div>
    <select id="fileSelect" disabled>
        <option value="">Aguarde...</option>
    </select>
    <button id="viewBtn" disabled style="background-color: #34a853;">Visualizar no Modal</button>
</div>

<!-- Modal -->
<div id="fileModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" id="modalClose">&times;</button>
        <iframe id="modalIframe" class="modal-iframe" src=""></iframe>
        <div class="modal-actions">
            <button id="modalDownloadBtn" class="btn-download-modal">Baixar Arquivo</button>
            <button id="modalCloseBtn" class="btn-close-modal">Fechar</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_MnCSdUT7Zd00up403KuHFvGFVo4Z_uGDNRRL39VIkQjJOWv8Xf03ubaLTo5Jd0E/exec'; 

    const selectEl = document.getElementById('fileSelect');
    const viewBtn = document.getElementById('viewBtn');
    const statusEl = document.getElementById('status');

    const modal = document.getElementById('fileModal');
    const modalIframe = document.getElementById('modalIframe');
    const modalDownloadBtn = document.getElementById('modalDownloadBtn');
    const modalClose = document.getElementById('modalClose');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    let currentFileId = null;
    let currentFileName = null;

    async function loadFiles() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();

            if (data && data.length > 0) {
                selectEl.innerHTML = '<option value="">Selecione um arquivo...</option>';
                data.forEach(file => {
                    const option = document.createElement('option');
                    option.value = file.id;
                    option.textContent = file.name.substring(0,7) + (file.name.length > 7 ? '   📒' : '');
                    option.dataset.name = file.name;
                    selectEl.appendChild(option);
                });
                
                selectEl.disabled = false;
                statusEl.textContent = "Arquivos prontos!";
            } else {
                statusEl.textContent = "Nenhum arquivo encontrado na pasta.";
            }
        } catch (error) {
            console.error(error);
            statusEl.textContent = "Erro ao conectar com o Google Script.";
        }
    }

    selectEl.addEventListener('change', () => {
        const selected = selectEl.value;
        viewBtn.disabled = !selected;
        if (selected) {
            currentFileId = selected;
            currentFileName = selectEl.options[selectEl.selectedIndex].textContent;
        }
    });

    viewBtn.addEventListener('click', () => {
        if (currentFileId) {
            const viewerUrl = `https://drive.google.com/file/d/${currentFileId}/preview`;
            modalIframe.src = viewerUrl;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    });

    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = 'auto';
        modalIframe.src = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalCloseBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });

    modalDownloadBtn.addEventListener('click', () => {
        if (currentFileId) {
            const downloadUrl = `https://drive.google.com/uc?export=download&id=${currentFileId}`;
            window.open(downloadUrl, '_blank');
        }
    });

    loadFiles();
</script>

</body>
</html>
