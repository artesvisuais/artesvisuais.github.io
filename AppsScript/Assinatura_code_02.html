// ==================== CONSTANTES GLOBAIS ====================
// IMPORTANTE: Substitua pelos valores reais antes de implantar

// ID da pasta "01_PDI_ORIGINAIS" (onde ficam os PDFs dos PDIs)
const ID_PASTA_PDI = 'Colar_Aqui_ID_Pasta_01_PDI_ORIGINAIS';   // ← COLOQUE O ID REAL

// ID da pasta "02_TERMOS_GERADOS" (onde serão salvos os termos assinados)
const FOLDER_TERMOS_ID = 'Colar_Aqui_ID_Pasta_02_Termos_Gerados';

// URL do Web App (para gerar os links de envio na planilha)

// IMPORTANTE: Após implantar, copie a URL e cole aqui a URLexec
const URL_WEB_APP = 'COLARA_AQUI_URL_exec'; // ← COLOQUE A URL REAL
// Vá em gerenciar Implantações e implante a mesma versão.

// Nome da aba da planilha que contém os dados dos alunos
const NOME_ABA_DADOS = 'BANCO_DADOS';

// ==================== WEB APP ====================
function doGet(e) {
  const idBusca = e.parameter.id;
  const template = HtmlService.createTemplateFromFile('index');
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(NOME_ABA_DADOS);
  
  if (!sheet) {
    template.aluno = null;
    return template.evaluate();
  }
  
  const dados = sheet.getDataRange().getValues();
  let alunoEncontrado = null;
  
  for (let i = 1; i < dados.length; i++) {
    if (dados[i][0].toString() == idBusca) {
      alunoEncontrado = {
        id: dados[i][0],
        nome: dados[i][1],
        arquivo: dados[i][2],
        linkPdf: getUrlPdf(dados[i][2])
      };
      break;
    }
  }
  
  template.aluno = alunoEncontrado;
  return template.evaluate()
    .setTitle('Termo de Ciência PDI')
    .addMetaTag('viewport', 'width=device-width, initial-scale=1');
}

function getUrlPdf(nomeArquivo) {
  try {
    const pastaPDI = DriveApp.getFolderById(ID_PASTA_PDI);
    const arquivos = pastaPDI.getFilesByName(nomeArquivo);
    if (!arquivos.hasNext()) return "#";
    const arquivo = arquivos.next();
    return `https://drive.google.com/file/d/${arquivo.getId()}/preview`;
  } catch(e) {
    console.error("Erro ao obter URL do PDF: " + e.message);
    return "#";
  }
}

function processarAssinatura(dados) {
  try {
    const ssRespostas = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("RESPOSTAS");
    const dataAtual = new Date();
    const protocolo = Utilities.getUuid();
    
    // 1. Hash do PDF original
    const pastaPDI = DriveApp.getFolderById(ID_PASTA_PDI);
    const arquivos = pastaPDI.getFilesByName(dados.arquivoPdi);
    if (!arquivos.hasNext()) throw new Error("Arquivo PDF não encontrado.");
    const arquivoPdi = arquivos.next();
    const bytes = arquivoPdi.getBlob().getBytes();
    const hash = Utilities.computeDigest(Utilities.DigestAlgorithm.SHA_256, bytes)
                  .map(b => ("0" + (b & 0xFF).toString(16)).slice(-2)).join("");
    
    // 2. Gerar o PDF do termo
    const htmlTermo = gerarHtmlTermo(dados, dataAtual, protocolo, hash);
    const termoBlob = Utilities.newBlob(htmlTermo, "text/html", "termo.html");
    const pastaDestino = DriveApp.getFolderById(FOLDER_TERMOS_ID);
    const termoPdf = pastaDestino.createFile(termoBlob.getAs("application/pdf"));
    termoPdf.setName(`TERMO_CIENCIA_${dados.estudante.replace(/[^a-zA-Z0-9]/g, '_')}_${dataAtual.getTime()}.pdf`);
    
    // 3. Salvar na aba RESPOSTAS
    if (ssRespostas) {
      ssRespostas.appendRow([
        dados.id, dados.estudante, dados.responsavel, dados.cpf,
        dataAtual, protocolo, hash, termoPdf.getUrl()
      ]);
    }
    
    // 4. Atualizar status na aba BANCO_DADOS
    const dbSheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(NOME_ABA_DADOS);
    const dbDados = dbSheet.getDataRange().getValues();
    for (let i = 1; i < dbDados.length; i++) {
      if (dbDados[i][0].toString() == dados.id) {
        dbSheet.getRange(i + 1, 4).setValue("Assinado");
        dbSheet.getRange(i + 1, 5).setValue(dataAtual);
        dbSheet.getRange(i + 1, 6).setValue(dados.responsavel);
        break;
      }
    }
    
    // 5. Registrar no LOG_ASSINATURAS
    const logSheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("LOG_ASSINATURAS");
    if (logSheet) {
      logSheet.appendRow([
        dataAtual, dados.id, dados.estudante, dados.responsavel,
        protocolo, dados.browserInfo || 'Não capturado', hash
      ]);
    }
    
    return "Sucesso! Sua declaração de ciência foi registrada com validade jurídica.";
    
  } catch(error) {
    console.error("Erro no processarAssinatura:", error);
    throw new Error("Erro ao processar declaração: " + error.message);
  }
}

function gerarHtmlTermo(dados, dataAtual, protocolo, hash) {
  return `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Termo de Ciência - ${dados.estudante}</title>
      <style>
        body { font-family: Arial, sans-serif; padding: 40px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #ddd; padding: 30px; border-radius: 10px; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 15px; }
        h2 { color: #34495e; margin-top: 25px; font-size: 18px; }
        .info { background: #f9f9f9; padding: 15px; margin: 20px 0; border-left: 4px solid #2c3e50; }
        .hash { font-family: monospace; font-size: 11px; word-break: break-all; background: #f0f0f0; padding: 10px; border-radius: 5px; }
        .protocolo { font-family: monospace; font-size: 12px; background: #e8f4f8; padding: 8px; border-radius: 5px; text-align: center; }
        .footer { margin-top: 40px; font-size: 10px; text-align: center; color: #777; border-top: 1px solid #ddd; padding-top: 20px; }
        .destaque { font-weight: bold; color: #2c3e50; }
        .declaracao { background: #fff9e6; padding: 20px; margin: 20px 0; text-align: center; font-style: italic; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>Termo de Ciência e Aceite</h1>
        <div class="declaracao">
          <p>Declaro para todos os fins legais que li, entendi e estou de acordo com o Plano de Desenvolvimento Individual (PDI) do estudante.</p>
        </div>
        <p>Eu, <span class="destaque">${dados.responsavel}</span>, portador(a) do CPF <span class="destaque">${dados.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4')}</span>, na qualidade de responsável legal, declaro que tomei ciência e concordo integralmente com o PDI do estudante <span class="destaque">${dados.estudante}</span>.</p>
        <div class="info">
          <p><strong>📄 Documento referenciado:</strong> ${dados.arquivoPdi}</p>
        </div>
        <h2>🔒 Registro de Auditoria e Validade Jurídica</h2>
        <p><strong>📅 Data/Hora da Declaração:</strong> ${dataAtual.toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })}</p>
        <p><strong>🆔 Protocolo Único:</strong> <span class="protocolo">${protocolo}</span></p>
        <p><strong>💻 Evidência Digital do Dispositivo:</strong> ${dados.browserInfo || 'Não disponível'}</p>
        <h2>🔐 Código de Integridade do Documento PDI (SHA-256)</h2>
        <div class="hash">${hash}</div>
        <p style="font-size: 12px;">✓ Este hash garante que o documento PDI original não foi alterado.</p>
        <div class="footer">
          <p>Validade Jurídica: MP 2.200-2/2001 • Lei 14.063/2020 • Código Civil - Art. 225</p>
          <p>Protocolo: ${protocolo.substring(0, 16)}-${dataAtual.getTime()}</p>
        </div>
      </div>
    </body>
    </html>
  `;
}

// ==================== MENU E SINCRONIZAÇÃO ====================
function onOpen() {
  const ui = SpreadsheetApp.getUi();
  ui.createMenu('🔄PDI')
    .addItem('Sincronizar PDIs', 'sincronizarPDIs')
    .addToUi();
}

function sincronizarPDIs() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(NOME_ABA_DADOS);
  
  if (!sheet) {
    SpreadsheetApp.getUi().alert(`❌ Aba "${NOME_ABA_DADOS}" não encontrada.`);
    return;
  }
  
  // Ler nomes existentes na Coluna C e maior ID na Coluna A
  const data = sheet.getDataRange().getValues();
  const existingFiles = [];
  let maxId = 100;
  
  for (let i = 1; i < data.length; i++) {
    const nomeArquivo = data[i][2];
    if (nomeArquivo && nomeArquivo.toString().trim() !== '') {
      existingFiles.push(nomeArquivo.toString().trim());
    }
    const idAtual = Number(data[i][0]);
    if (!isNaN(idAtual) && idAtual > maxId) maxId = idAtual;
  }
  
  // Acessar pasta PDI pelo ID
  let folder;
  try {
    folder = DriveApp.getFolderById(ID_PASTA_PDI);
  } catch(e) {
    SpreadsheetApp.getUi().alert('❌ Pasta "01_PDI_ORIGINAIS" não encontrada. Verifique o ID.');
    return;
  }
  
  const files = folder.getFilesByType(MimeType.PDF);
  const newRows = [];
  
  while (files.hasNext()) {
    const fileName = files.next().getName();
    if (!existingFiles.includes(fileName)) {
      maxId++;
      newRows.push([maxId, '', fileName]);
    }
  }
  
  if (newRows.length === 0) {
    SpreadsheetApp.getUi().alert('✅ Tudo sincronizado. Nenhum novo arquivo.');
    return;
  }
  
  // Inserir novas linhas
  const ultimaLinhaAntes = sheet.getLastRow();
  sheet.getRange(ultimaLinhaAntes + 1, 1, newRows.length, 3).setValues(newRows);
  
  // Verificar se a URL do Web App foi configurada
  if (URL_WEB_APP === 'https://script.google.com/macros/s/SEU_ID/exec') {
    SpreadsheetApp.getUi().alert(
      '⚠️ Configuração obrigatória',
      'Substitua a constante URL_WEB_APP pela URL real do Web App antes de usar a sincronização.',
      SpreadsheetApp.getUi().ButtonSet.OK
    );
    return;
  }
  
  // Adicionar fórmula de hiperlink na coluna G
  for (let i = 0; i < newRows.length; i++) {
    const linhaAtual = ultimaLinhaAntes + 1 + i;
    const formula = `=HYPERLINK("${URL_WEB_APP}?id="&A${linhaAtual}; "📧 Enviar Termo para o Responsável")`;
    sheet.getRange('G' + linhaAtual).setFormula(formula);
  }
  
  SpreadsheetApp.getUi().alert(`✅ ${newRows.length} novo(s) PDI(s) adicionado(s) com link de envio!`);
}

<body>
  <div class="card">
    <? if(aluno) { ?>
      <h3>📋 TERMO DE CIÊNCIA PDI</h3>
      <p style="text-align: center; margin-bottom: 20px;"><strong>Estudante:</strong> <?= aluno.nome ?></p>
      
      <button class="btn btn-primary" onclick="visualizar('<?= aluno.linkPdf ?>')">
        📄 1. VISUALIZAR DOCUMENTO PDI
      </button>

      <div class="separator"></div>

      <div id="secaoAssinatura">
        <label class="checkbox-label">
          <input type="checkbox" id="check" onclick="validar()"> 
          ✅ Declaro que visualizei, li e estou de acordo com o documento.
        </label>
        
        <input type="text" id="responsavel" placeholder="Nome completo do responsável legal">
        
        <input type="text" id="cpf" placeholder="CPF (apenas números - 11 dígitos)" maxlength="11" oninput="validarCPF()">
        <div id="cpfError" class="error"></div>
        
        <button id="btnConfirmar" class="btn" disabled onclick="enviar('<?= aluno.nome ?>', '<?= aluno.arquivo ?>', '<?= aluno.id ?>')">
          📝 2. DECLARAR CIÊNCIA E CONCORDÂNCIA
        </button>
        
        <div id="statusMsg" style="margin-top: 15px;"></div>
        
        <div class="info-text">
          🔒 Este registro tem validade jurídica garantida por:<br>
          • Hash SHA-256 do documento<br>
          • Protocolo único de auditoria<br>
          • Timestamp do Google<br>
          • Registro imutável em planilha
        </div>
      </div>
    <? } else { ?>
      <h3 style="color:#e74c3c">⚠️ Documento não localizado</h3>
      <p>Verifique se o link de acesso está correto.</p>
    <? } ?>

    <div class="footer">
      Documento eletrônico com validade jurídica conforme MP 2.200-2/2001.<br>
      O hash SHA-256 e o protocolo único garantem a integridade do documento.
    </div>
  </div>

  <script>
    let visualizou = false;

    // Validação de CPF
    function validarCPF() {
      const cpfInput = document.getElementById('cpf');
      const cpfError = document.getElementById('cpfError');
      let cpf = cpfInput.value.replace(/\D/g, '');
      
      cpfInput.value = cpf;
      
      if (cpf.length === 0) {
        cpfError.innerHTML = '';
        cpfError.className = 'error';
        cpfInput.classList.remove('error-input');
        return false;
      }
      
      if (cpf.length !== 11) {
        cpfError.innerHTML = '⚠️ CPF precisa ter 11 dígitos. Faltam ' + (11 - cpf.length) + ' dígitos.';
        cpfError.className = 'error';
        cpfInput.classList.add('error-input');
        return false;
      }
      
      if (!isValidCPF(cpf)) {
        cpfError.innerHTML = '❌ CPF inválido. Verifique os números.';
        cpfError.className = 'error';
        cpfInput.classList.add('error-input');
        return false;
      }
      
      cpfError.innerHTML = '✅ CPF válido';
      cpfError.className = 'success';
      cpfInput.classList.remove('error-input');
      return true;
    }
    
    function isValidCPF(cpf) {
      if (cpf.length !== 11) return false;
      if (/^(\d)\1{10}$/.test(cpf)) return false;
      
      let sum = 0;
      for (let i = 0; i < 9; i++) {
        sum += parseInt(cpf.charAt(i)) * (10 - i);
      }
      let remainder = 11 - (sum % 11);
      let digit = remainder >= 10 ? 0 : remainder;
      if (digit !== parseInt(cpf.charAt(9))) return false;
      
      sum = 0;
      for (let i = 0; i < 10; i++) {
        sum += parseInt(cpf.charAt(i)) * (11 - i);
      }
      remainder = 11 - (sum % 11);
      digit = remainder >= 10 ? 0 : remainder;
      if (digit !== parseInt(cpf.charAt(10))) return false;
      
      return true;
    }

    function visualizar(url) {
      if(url === "#" || !url) {
        alert("Arquivo não disponível.");
        return;
      }
      window.open(url, '_blank');
      visualizou = true;
      validar();
    }

    function validar() {
      const aceitou = document.getElementById('check').checked;
      const responsavel = document.getElementById('responsavel').value.trim();
      const cpfValido = validarCPF();
      const btn = document.getElementById('btnConfirmar');
      
      btn.disabled = !(visualizou && aceitou && responsavel !== '' && cpfValido);
    }

    // Adiciona event listeners
    var responsavelInput = document.getElementById('responsavel');
    var cpfInput = document.getElementById('cpf');
    var checkInput = document.getElementById('check');
    
    if (responsavelInput) {
      responsavelInput.addEventListener('input', validar);
    }
    if (cpfInput) {
      cpfInput.addEventListener('input', function() {
        validarCPF();
        validar();
      });
    }
    if (checkInput) {
      checkInput.addEventListener('change', validar);
    }

    function getBrowserInfo() {
      return {
        navegador: navigator.userAgent.split(' ').slice(0,3).join(' '),
        idioma: navigator.language,
        sistema: navigator.platform,
        resolucao: screen.width + 'x' + screen.height,
        fusoHorario: Intl.DateTimeFormat().resolvedOptions().timeZone,
        dataHoraAcesso: new Date().toLocaleString('pt-BR')
      };
    }

    function enviar(nomeEst, arqPdi, idAluno) {
      const resp = document.getElementById('responsavel').value.trim();
      const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
      const statusDiv = document.getElementById('statusMsg');
      
      if(!resp || !cpf) {
        alert("Preencha todos os campos.");
        return;
      }
      
      if (cpf.length !== 11 || !isValidCPF(cpf)) {
        alert("CPF inválido.");
        return;
      }
      
      const btn = document.getElementById('btnConfirmar');
      const textoOriginal = btn.innerText;
      btn.innerText = "⏳ Registrando...";
      btn.disabled = true;
      statusDiv.innerHTML = '<div class="loading">📝 Registrando sua declaração...</div>';
      
      const browserInfo = getBrowserInfo();
      
      google.script.run
        .withSuccessHandler(function(msg) {
          document.body.innerHTML = '<div class="card">' +
            '<h3 style="color:#27ae60;text-align:center">✓ DECLARAÇÃO REGISTRADA</h3>' +
            '<div style="text-align:center; margin:20px 0; padding:15px; background:#f0fff0; border-radius:8px;">' +
            '<p style="font-size:14px;"><strong>' + msg + '</strong></p>' +
            '</div>' +
            '<div style="background:#e8f4f8; padding:12px; border-radius:6px; font-size:12px; margin:15px 0;">' +
            '<p><strong>📌 Dados do registro:</strong></p>' +
            '<p>🔹 Responsável: ' + resp + '</p>' +
            '<p>🔹 CPF: ' + cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') + '</p>' +
            '<p>🔹 Estudante: ' + nomeEst + '</p>' +
            '<p>🔹 Data/Hora: ' + new Date().toLocaleString('pt-BR') + '</p>' +
            '<p>🔹 Protocolo: Gerado automaticamente</p>' +
            '</div>' +
            '<p style="text-align:center; margin-top:15px; font-size:12px;">O comprovante em PDF foi salvo na pasta do Google Drive.</p>' +
            '<p style="text-align:center; margin-top:10px; font-size:11px; color:#7f8c8d;">✅ Esta página já pode ser fechada.</p>' +
            '</div>';
        })
        .withFailureHandler(function(err) {
          alert("Erro: " + err.message);
          btn.innerText = textoOriginal;
          btn.disabled = false;
          statusDiv.innerHTML = '';
        })
        .processarAssinatura({
          id: idAluno,
          estudante: nomeEst,
          arquivoPdi: arqPdi,
          responsavel: resp,
          cpf: cpf,
          browserInfo: JSON.stringify(browserInfo)
        });
    }
  </script>
</body>

function inicializarEstrutura() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // 1. RENOMEAR A PLANILHA
  ss.setName("Banco_de_dados");
  
  // 2. ESTRUTURA DE ABAS E CABEÇALHOS
  var abas = {
    "Banco_Dados": ["ID", "Estudante", "Arquivo_PDF", "Status", "Data_Assinatura", "Responsavel", "Link de Envio"],
    "RESPOSTAS": ["ID", "Estudante", "Responsavel", "CPF", "Data/Hora", "Protocolo", "Hash_PDI", "Link Termo"],
    "LOG_ASSINATURAS": ["Data/Hora", "ID do Aluno", "Nome do Estudante", "Responsável", "IP", "Device Info", "Hash"]
  };
  
  for (var nomeAba in abas) {
    var sheet = ss.getSheetByName(nomeAba);
    if (!sheet) {
      sheet = ss.insertSheet(nomeAba);
    }
    
    // Adiciona o cabeçalho se a aba estiver vazia e houver dados para inserir
    if (abas[nomeAba].length > 0 && sheet.getLastRow() === 0) {
      sheet.getRange(1, 1, 1, abas[nomeAba].length)
           .setValues([abas[nomeAba]])
           .setFontWeight("bold")
           .setBackground("#f3f3f3");
      sheet.autoResizeColumns(1, abas[nomeAba].length);
    }
  }
  
  // 3. DELETAR A ABA PADRÃO "Página1" (se ela existir)
  var abaPadrao = ss.getSheetByName("Página1");
  if (abaPadrao) {
    ss.deleteSheet(abaPadrao);
  }
  
  // 4. ESTRUTURA DE PASTAS NO GOOGLE DRIVE
  try {
    var planilhaId = ss.getId();
    var arquivoPlanilha = DriveApp.getFileById(planilhaId);
    var pastasPais = arquivoPlanilha.getParents();
    
    if (pastasPais.hasNext()) {
      var pastaPai = pastasPais.next();
      var pastasParaCriar = ["01_PDI_ORIGINAIS", "02_TERMOS_GERADOS", "03_CONFIG"];
      
      pastasParaCriar.forEach(function(nomePasta) {
        var pastasExistentes = pastaPai.getFoldersByName(nomePasta);
        if (!pastasExistentes.hasNext()) {
          pastaPai.createFolder(nomePasta);
        }
      });
      
      SpreadsheetApp.getUi().alert("Sucesso!", "Planilha renomeada, abas organizadas e pastas do Drive verificadas!", SpreadsheetApp.getUi().ButtonSet.OK);
    }
  } catch (erro) {
    SpreadsheetApp.getUi().alert("Aviso", "A planilha e as abas foram ajustadas, mas houve um erro ao criar as pastas no Drive: " + erro.toString(), SpreadsheetApp.getUi().ButtonSet.OK);
  }
}

function onOpen() {
  var ui = SpreadsheetApp.getUi();
  ui.createMenu('Sistema PDI')
    .addItem('Inicializar Estrutura', 'inicializarEstrutura')
    .addToUi();
}


            </textarea>

    <script>
        function copiar(idCampo) {
            var copyText = document.getElementById(idCampo);
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            
            // Alerta visual rápido e discreto mudando o texto do botão temporariamente
            var botao = event.target;
            var textoOriginal = botao.innerHTML;
            botao.innerHTML = "✓ Copiado!";
            botao.style.background = "#007bff";
            
            setTimeout(function() {
                botao.innerHTML = textoOriginal;
                botao.style.background = "#28a745";
            }, 1500);
        }
    </script>
